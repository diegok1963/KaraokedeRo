<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KaraokeDeRo – Administrador de Reservas</title>
<style>
:root{--bg:#0d0d1a;--card:#16162a;--card2:#1e1e38;--accent:#c026d3;--accent2:#7c3aed;--gold:#f59e0b;--text:#f1f0ff;--muted:#9ca3af;--border:#2e2e50;--danger:#ef4444;--success:#22c55e;--input-bg:#0d0d1a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#1a0030 0%,#0d0d1a 60%,#1a001a 100%);border-bottom:2px solid var(--accent);padding:18px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 30px rgba(192,38,211,.25)}
.logo-icon{font-size:2.2rem;filter:drop-shadow(0 0 10px #c026d3)}
.header-text h1{font-size:1.6rem;font-weight:800;background:linear-gradient(90deg,#e879f9,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.header-text p{font-size:.78rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.badge-total{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:.75rem;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:1px}
.container{max-width:1300px;margin:0 auto;padding:28px 20px}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.s1::before{background:linear-gradient(90deg,#c026d3,#7c3aed)}
.stat-card.s2::before{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.stat-card.s3::before{background:linear-gradient(90deg,#22c55e,#06b6d4)}
.stat-card.s4::before{background:linear-gradient(90deg,#06b6d4,#7c3aed)}
.stat-num{font-size:2rem;font-weight:800;line-height:1;margin-bottom:4px}
.s1 .stat-num{color:#e879f9}.s2 .stat-num{color:var(--gold)}.s3 .stat-num{color:#4ade80}.s4 .stat-num{color:#22d3ee}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:22px}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 40px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 15px rgba(192,38,211,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,38,211,.5)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:var(--danger)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:var(--success)}
.btn-success:hover{background:rgba(34,197,94,.25)}
.btn-excel{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.5);color:#4ade80;font-weight:600}
.btn-excel:hover{background:rgba(34,197,94,.28);transform:translateY(-1px)}
.btn-import{background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.5);color:#22d3ee;font-weight:600}
.btn-import:hover{background:rgba(6,182,212,.28);transform:translateY(-1px)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-bottom:28px}
.reserva-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.reserva-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(192,38,211,.2);border-color:var(--accent)}
.card-top{background:linear-gradient(135deg,#1a0030,#1e1e38);padding:16px 18px 14px;border-bottom:2px solid var(--accent);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-nombre{font-size:1.05rem;font-weight:800;color:#e879f9;line-height:1.2}
.card-fecha{font-size:.72rem;color:var(--muted);margin-top:4px}
.card-num{background:rgba(192,38,211,.2);border:1px solid rgba(192,38,211,.4);color:#e879f9;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.card-body{padding:14px 18px}
.card-field{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.card-field:last-child{margin-bottom:0}
.card-field-icon{font-size:1rem;margin-top:1px;flex-shrink:0}
.card-field-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.card-field-value{font-size:.88rem;color:var(--text);font-family:monospace}
.amigos-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.amigo-row{font-size:.85rem;color:#c4b5fd;padding:4px 8px;background:rgba(124,58,237,.15);border-left:2px solid rgba(124,58,237,.5);border-radius:4px}
.card-footer{padding:10px 18px 14px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border)}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem;grid-column:1/-1}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:10px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:560px;box-shadow:0 25px 60px rgba(0,0,0,.6),0 0 40px rgba(192,38,211,.15);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-header h2{font-size:1.1rem;font-weight:700}
.modal-icon{font-size:1.4rem}
.modal-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s}
.modal-close:hover{color:var(--danger)}
.modal-body{padding:22px 24px}
.modal-footer{padding:16px 24px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.form-group input,.form-group textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,38,211,.15)}
.form-group textarea{resize:vertical;min-height:80px}
.form-hint{font-size:.72rem;color:var(--muted);margin-top:5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.confirm-modal .modal-body{text-align:center;padding:30px 24px}
.confirm-icon{font-size:3rem;margin-bottom:12px}
.confirm-modal h3{font-size:1.1rem;margin-bottom:8px}
.confirm-modal p{color:var(--muted);font-size:.88rem}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:.88rem;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.4);animation:toastIn .3s ease;min-width:260px}
@keyframes toastIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-left:4px solid var(--success)}.toast.error{border-left:4px solid var(--danger)}.toast.info{border-left:4px solid var(--accent)}
.pagination{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.page-info{font-size:.82rem;color:var(--muted)}
.page-btns{display:flex;gap:6px}
.page-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
@media(max-width:700px){header{padding:14px 16px}.header-text h1{font-size:1.2rem}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<div class="logo-icon">🎤</div>
<div class="header-text"><h1>KaraokeDeRo</h1><p>Administrador de Reservas</p></div>
<div class="header-right">
<span class="badge-total" id="badge-total">0 reservas</span>
<button class="btn btn-primary" onclick="openModal()">＋ Nueva Reserva</button>
</div>
</header>
<div class="container">
<div class="stats-bar">
<div class="stat-card s1"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total Reservas</div></div>
<div class="stat-card s2"><div class="stat-num" id="stat-hoy">0</div><div class="stat-label">Hoy</div></div>
<div class="stat-card s3"><div class="stat-num" id="stat-amigos">0</div><div class="stat-label">Total Asistentes</div></div>
<div class="stat-card s4"><div class="stat-num" id="stat-promedio">0</div><div class="stat-label">Prom. Amigos/Reserva</div></div>
</div>
<div class="toolbar">
<div class="search-wrap">
<span class="ico">🔍</span>
<input id="search-input" oninput="renderTable()" placeholder="Buscar por nombre, teléfono o amigos…" type="text"/>
</div>
<button class="btn btn-excel" onclick="exportExcel()">📊 Exportar Excel</button>
<button class="btn btn-import" onclick="document.getElementById('imp').click()">📥 Importar Excel</button>
<input accept=".xlsx,.xls" id="imp" onchange="importExcel(event)" style="display:none" type="file"/>
</div>
<div class="cards-grid" id="cards"></div>
<div class="pagination">
<div class="page-info" id="page-info"></div>
<div class="page-btns" id="page-btns"></div>
</div>
</div>
<!-- MODAL NUEVA/EDITAR -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
<div class="modal-header">
<span class="modal-icon" id="modal-icon">🎤</span>
<h2 id="modal-title">Nueva Reserva</h2>
<button class="modal-close" onclick="closeModal()">✕</button>
</div>
<div class="modal-body">
<div class="form-row">
<div class="form-group"><label>Nombre y Apellido *</label><input id="f-nombre" placeholder="Ej: María González" type="text"/></div>
<div class="form-group"><label>Teléfono *</label><input id="f-telefono" placeholder="Ej: 11 5555-5555" type="tel"/></div>
</div>
<div class="form-group"><label>Fecha y Hora</label><input id="f-fecha" type="datetime-local"/></div>
<div class="form-group">
<label>Amigos (separados por coma)</label>
<textarea id="f-amigos" placeholder="Ej: Juan García, Ana López"></textarea>
<div class="form-hint">Ingresá los nombres separados por coma ","</div>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
<button class="btn btn-primary" onclick="saveReserva()">💾 Guardar</button>
</div>
</div>
</div>
<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="modal-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
<div class="modal confirm-modal" style="max-width:400px">
<div class="modal-header">
<span class="modal-icon">⚠️</span>
<h2>Confirmar eliminación</h2>
<button class="modal-close" onclick="closeConfirm()">✕</button>
</div>
<div class="modal-body">
<div class="confirm-icon">🗑️</div>
<h3>¿Eliminar esta reserva?</h3>
<p id="confirm-desc">Esta acción no se puede deshacer.</p>
</div>
<div class="modal-footer">
<button class="btn btn-outline" onclick="closeConfirm()">Cancelar</button>
<button class="btn btn-danger" onclick="confirmDelete()">🗑 Eliminar</button>
</div>
</div>
</div>
<!-- MODAL DETALLE -->
<div class="modal-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
<div class="modal">
<div class="modal-header">
<span class="modal-icon">👤</span>
<h2 id="detail-title">Detalle</h2>
<button class="modal-close" onclick="closeDetail()">✕</button>
</div>
<div class="modal-body" id="detail-body"></div>
<div class="modal-footer">
<button class="btn btn-outline" onclick="closeDetail()">Cerrar</button>
<button class="btn btn-primary" onclick="editFromDetail()">✏️ Editar</button>
</div>
</div>
</div>
<div id="toast-container"></div>
<script src="xlsx.min.js"></script>
<script>
var reservas = [
  {id:1, fecha:"2026-07-18 23:52:12", nombre:"AAAAA", telefono:"88 8888-8888", amigos:"JUAN GARCIA, PABLO RAMIRES, PAOLA GONZALEZ, MIRTA PALACIOS"},
  {id:2, fecha:"2026-07-19 00:05:02", nombre:"bbbbbb", telefono:"99999999999", amigos:"Juan Garcia, Pablo Ramirez, Carlos Gonzalez, Claudia Medite"}
];
var nextId = 3;
var editingId = null;
var deletingId = null;
var detailId = null;
var sortField = "fecha";
var sortDir = "desc";
var currentPage = 1;
var PAGE_SIZE = 10;

function updateStats() {
  var total = reservas.length;
  var hoy = new Date().toISOString().slice(0,10);
  var hoyCount = 0;
  var totalAmigos = 0;
  for (var i=0; i<reservas.length; i++) {
    if (reservas[i].fecha.startsWith(hoy)) hoyCount++;
    if (reservas[i].amigos && reservas[i].amigos.trim()) {
      totalAmigos += reservas[i].amigos.split(",").map(function(a){return a.trim();}).filter(Boolean).length;
    }
  }
  var promedio = total > 0 ? (totalAmigos/total).toFixed(1) : 0;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-hoy").textContent = hoyCount;
  document.getElementById("stat-amigos").textContent = totalAmigos + total;
  document.getElementById("stat-promedio").textContent = promedio;
  document.getElementById("badge-total").textContent = total + (total===1?" reserva":" reservas");
}

function getSorted(arr) {
  return arr.slice().sort(function(a,b) {
    var va = a[sortField]||"", vb = b[sortField]||"";
    if (sortField==="fecha") { va=new Date(va); vb=new Date(vb); }
    else { va=va.toString().toLowerCase(); vb=vb.toString().toLowerCase(); }
    if (va<vb) return sortDir==="asc"?-1:1;
    if (va>vb) return sortDir==="asc"?1:-1;
    return 0;
  });
}

function getFiltered() {
  var q = document.getElementById("search-input").value.toLowerCase().trim();
  if (!q) return reservas;
  return reservas.filter(function(r) {
    return r.nombre.toLowerCase().includes(q) || r.telefono.toLowerCase().includes(q) || r.amigos.toLowerCase().includes(q);
  });
}

function clearSearch() {
  document.getElementById("search-input").value = "";
  currentPage = 1;
  renderTable();
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function formatFecha(f) {
  if (!f) return "—";
  var d = new Date(f.replace(" ","T"));
  if (isNaN(d)) return f;
  return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}) + " " +
         d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
}

function nowLocal() {
  var d = new Date();
  var pad = function(n){return String(n).padStart(2,"0");};
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"T"+pad(d.getHours())+":"+pad(d.getMinutes());
}

function renderTable() {
  var filtered = getSorted(getFiltered());
  var total = filtered.length;
  var totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  var start = (currentPage-1)*PAGE_SIZE;
  var page = filtered.slice(start, start+PAGE_SIZE);
  var cards = document.getElementById("cards");

  if (page.length === 0) {
    cards.innerHTML = "<div class=\"empty-state\"><span class=\"empty-icon\">🎵</span>No se encontraron reservas</div>";
  } else {
    var html = "";
    for (var i=0; i<page.length; i++) {
      var r = page[i];
      var num = start + i + 1;
      var amigosArr = r.amigos ? r.amigos.split(",").map(function(a){return a.trim();}).filter(Boolean) : [];
      var amigosHtml = amigosArr.length > 0
        ? amigosArr.map(function(a){return "<div class=\"amigo-row\">👤 "+escHtml(a)+"</div>";}).join("")
        : "<span style=\"color:var(--muted);font-size:.8rem\">Sin amigos registrados</span>";
      html += "<div class=\"reserva-card\">";
      html += "<div class=\"card-top\">";
      html += "<div><div class=\"card-nombre\">Reserva de "+escHtml(r.nombre)+"</div>";
      html += "<div class=\"card-fecha\">📅 "+formatFecha(r.fecha)+"</div></div>";
      html += "<span class=\"card-num\">#"+num+"</span></div>";
      html += "<div class=\"card-body\">";
      html += "<div class=\"card-field\"><span class=\"card-field-icon\">📞</span>";
      html += "<div><div class=\"card-field-label\">Teléfono</div>";
      html += "<div class=\"card-field-value\">"+escHtml(r.telefono)+"</div></div></div>";
      html += "<div class=\"card-field\"><span class=\"card-field-icon\">👥</span>";
      html += "<div><div class=\"card-field-label\">Amigos ("+amigosArr.length+")</div>";
      html += "<div class=\"amigos-list\">"+amigosHtml+"</div></div></div>";
      html += "</div>";
      html += "<div class=\"card-footer\">";
      html += "<button class=\"btn btn-outline btn-sm\" onclick=\"openDetail("+r.id+")\">👁 Ver</button>";
      html += "<button class=\"btn btn-success btn-sm\" onclick=\"openModal("+r.id+")\">✏️ Editar</button>";
      html += "<button class=\"btn btn-danger btn-sm\" onclick=\"openConfirm("+r.id+")\">🗑 Eliminar</button>";
      html += "</div></div>";
    }
    cards.innerHTML = html;
  }

  document.getElementById("page-info").textContent = total===0 ? "Sin resultados" :
    "Mostrando "+(start+1)+"–"+Math.min(start+PAGE_SIZE,total)+" de "+total;

  var pageBtns = document.getElementById("page-btns");
  pageBtns.innerHTML = "";
  function addBtn(label, pg, disabled, active) {
    var b = document.createElement("button");
    b.className = "page-btn" + (active?" active":"");
    b.textContent = label;
    b.disabled = disabled;
    b.onclick = (function(p){return function(){currentPage=p;renderTable();};})(pg);
    pageBtns.appendChild(b);
  }
  addBtn("‹", currentPage-1, currentPage===1, false);
  for (var p=1; p<=totalPages; p++) addBtn(p, p, false, p===currentPage);
  addBtn("›", currentPage+1, currentPage===totalPages, false);

  updateStats();
}

function openModal(id) {
  editingId = id || null;
  document.getElementById("modal-icon").textContent = id ? "✏️" : "🎤";
  document.getElementById("modal-title").textContent = id ? "Editar Reserva" : "Nueva Reserva";
  if (id) {
    var r = reservas.find(function(x){return x.id===id;});
    if (!r) return;
    document.getElementById("f-nombre").value = r.nombre;
    document.getElementById("f-telefono").value = r.telefono;
    document.getElementById("f-amigos").value = r.amigos;
    document.getElementById("f-fecha").value = r.fecha ? r.fecha.replace(" ","T").slice(0,16) : nowLocal();
  } else {
    document.getElementById("f-nombre").value = "";
    document.getElementById("f-telefono").value = "";
    document.getElementById("f-amigos").value = "";
    document.getElementById("f-fecha").value = nowLocal();
  }
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(function(){document.getElementById("f-nombre").focus();},100);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  editingId = null;
}

function saveReserva() {
  var nombre = document.getElementById("f-nombre").value.trim();
  var telefono = document.getElementById("f-telefono").value.trim();
  var amigos = document.getElementById("f-amigos").value.trim();
  var fechaRaw = document.getElementById("f-fecha").value;
  if (!nombre) { toast("⚠️ El nombre es obligatorio","error"); return; }
  if (!telefono) { toast("⚠️ El teléfono es obligatorio","error"); return; }
  var fecha = fechaRaw ? fechaRaw.replace("T"," ")+":00" : new Date().toISOString().replace("T"," ").slice(0,19);
  if (editingId) {
    var idx = reservas.findIndex(function(r){return r.id===editingId;});
    if (idx !== -1) { reservas[idx] = {id:editingId, fecha:fecha, nombre:nombre, telefono:telefono, amigos:amigos}; }
    toast("✅ Reserva actualizada","success");
  } else {
    reservas.push({id:nextId++, fecha:fecha, nombre:nombre, telefono:telefono, amigos:amigos});
    toast("🎤 Nueva reserva agregada","success");
  }
  closeModal();
  renderTable();
  exportExcel();
}

function openDetail(id) {
  detailId = id;
  var r = reservas.find(function(x){return x.id===id;});
  if (!r) return;
  document.getElementById("detail-title").textContent = r.nombre;
  var amigosArr = r.amigos ? r.amigos.split(",").map(function(a){return a.trim();}).filter(Boolean) : [];
  var chips = amigosArr.map(function(a){return "<span style=\"background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:#c4b5fd;font-size:.72rem;padding:2px 8px;border-radius:20px;margin:2px;display:inline-block\">"+escHtml(a)+"</span>";}).join("") || "<span style=\"color:var(--muted)\">Sin amigos</span>";
  document.getElementById("detail-body").innerHTML =
    "<div class=\"form-group\"><label>Fecha y Hora</label><div style=\"padding:10px 14px;background:var(--input-bg);border-radius:10px;border:1px solid var(--border);color:var(--muted)\">"+formatFecha(r.fecha)+"</div></div>"+
    "<div class=\"form-row\"><div class=\"form-group\"><label>Nombre</label><div style=\"padding:10px 14px;background:var(--input-bg);border-radius:10px;border:1px solid var(--border);color:#e879f9;font-weight:700\">"+escHtml(r.nombre)+"</div></div>"+
    "<div class=\"form-group\"><label>Teléfono</label><div style=\"padding:10px 14px;background:var(--input-bg);border-radius:10px;border:1px solid var(--border);color:#a78bfa;font-family:monospace\">"+escHtml(r.telefono)+"</div></div></div>"+
    "<div class=\"form-group\"><label>Amigos ("+amigosArr.length+")</label><div style=\"padding:10px 14px;background:var(--input-bg);border-radius:10px;border:1px solid var(--border);line-height:2\">"+chips+"</div></div>";
  document.getElementById("detail-overlay").classList.add("open");
}

function closeDetail() { document.getElementById("detail-overlay").classList.remove("open"); detailId=null; }
function editFromDetail() { var id=detailId; closeDetail(); openModal(id); }

function openConfirm(id) {
  deletingId = id;
  var r = reservas.find(function(x){return x.id===id;});
  if (r) document.getElementById("confirm-desc").textContent = "Se eliminará la reserva de \""+r.nombre+"\". Esta acción no se puede deshacer.";
  document.getElementById("confirm-overlay").classList.add("open");
}
function closeConfirm() { document.getElementById("confirm-overlay").classList.remove("open"); deletingId=null; }
function confirmDelete() {
  if (deletingId===null) return;
  var r = reservas.find(function(x){return x.id===deletingId;});
  reservas = reservas.filter(function(x){return x.id!==deletingId;});
  closeConfirm();
  renderTable();
  toast("🗑 Reserva de \""+r.nombre+"\" eliminada","info");
}

function exportExcel() {
  if (typeof XLSX === "undefined") { toast("⚠️ Librería Excel no disponible","error"); return; }
  var data = [["Marca temporal","Nombre y Apellido","Nro de Teléfono de Contacto","Amigos"]];
  for (var i=0; i<reservas.length; i++) {
    data.push([reservas[i].fecha, reservas[i].nombre, reservas[i].telefono, reservas[i].amigos]);
  }
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(data);
  ws["!cols"] = [{wch:22},{wch:28},{wch:24},{wch:60}];
  XLSX.utils.book_append_sheet(wb, ws, "Reservas");
  XLSX.writeFile(wb, "KaraokeDeRo_Reservas_"+new Date().toISOString().slice(0,10)+".xlsx");
  toast("📊 Excel exportado correctamente","success");
}

function importExcel(event) {
  var file = event.target.files[0];
  if (!file) return;
  toast("⏳ Leyendo archivo...","info");
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type:"binary", cellDates:true});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var allRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
      if (!allRows || allRows.length < 2) { toast("⚠️ El archivo no tiene datos","error"); return; }
      var headers = allRows[0];
      var iF=0, iN=1, iT=2, iA=3;
      for (var h=0; h<headers.length; h++) {
        var hh = String(headers[h]).toLowerCase();
        if (hh.includes("temporal")||hh.includes("fecha")) iF=h;
        if (hh.includes("nombre")) iN=h;
        if (hh.includes("tel")) iT=h;
        if (hh.includes("amigo")||hh.includes("venis")) iA=h;
      }
      var nuevas = [];
      for (var i=1; i<allRows.length; i++) {
        var row = allRows[i];
        var nombre = String(row[iN]||"").trim();
        if (!nombre) continue;
        var fechaRaw = row[iF];
        var fecha = fechaRaw instanceof Date ? fechaRaw.toISOString().replace("T"," ").slice(0,19) : String(fechaRaw||"");
        nuevas.push({id:nextId++, fecha:fecha, nombre:nombre, telefono:String(row[iT]||"").trim(), amigos:String(row[iA]||"").trim()});
      }
      if (nuevas.length===0) { toast("⚠️ No se encontraron reservas válidas","error"); return; }
      if (reservas.length>0) {
        if (confirm("¿Reemplazar las reservas actuales?\nAceptar = Reemplazar\nCancelar = Agregar")) {
          reservas = nuevas;
        } else {
          reservas = reservas.concat(nuevas);
        }
      } else {
        reservas = nuevas;
      }
      currentPage = 1;
      renderTable();
      toast("📥 "+nuevas.length+" reservas importadas","success");
    } catch(err) {
      toast("❌ Error: "+err.message,"error");
    }
    event.target.value = "";
  };
  reader.readAsBinaryString(file);
}

function toast(msg, type) {
  var c = document.getElementById("toast-container");
  var t = document.createElement("div");
  t.className = "toast "+(type||"info");
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){t.style.opacity="0";t.style.transform="translateX(40px)";t.style.transition=".3s";setTimeout(function(){t.remove();},300);},3000);
}

document.addEventListener("keydown", function(e) {
  if (e.key==="Escape") { closeModal(); closeConfirm(); closeDetail(); }
  if ((e.ctrlKey||e.metaKey) && e.key==="Enter") {
    if (document.getElementById("modal-overlay").classList.contains("open")) saveReserva();
  }
});

renderTable();
</script>
</body>
